name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Lint, build and unit tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Unit tests
      run: npm run test:unit

  security:
    name: Security (dependencies and secrets)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'

    # Non-blocking against a measured legacy baseline (63 vulnerabilities as of
    # 2026-07-13, see CHANGELOG): almost all of them are transitive dependencies
    # of bibtex-parse-js, an unmaintained package (last release 2017) whose own
    # package.json wrongly lists a dev-only test framework (ava) as a
    # dependency. Fixing this means replacing bibtex-parse-js in
    # src/parsers/bibtexParser.js, a production-code change with different
    # parsing behavior that needs its own review — tracked as follow-up, not
    # bundled into this PR. `vsce` (the actual source of most prior findings)
    # was already replaced by the maintained @vscode/vsce in this change.
    - name: npm audit (high and above) — informational, non-blocking on legacy debt
      continue-on-error: true
      run: npm audit --audit-level=high

    - name: Scan for secrets (Gitleaks)
      # Runs the gitleaks CLI directly instead of gitleaks/gitleaks-action:
      # the action requires a license for organization repos on some plans and
      # is being migrated off the deprecated Node 20 runtime. The CLI has no
      # such requirement and is pinned by release tag below.
      run: |
        curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
        ./gitleaks git --redact -v
