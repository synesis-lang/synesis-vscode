# Pre-commit hooks for synesis-vscode (VS Code extension).
# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files
#
# Note: ESLint is not enforced here — it runs in CI (npm run lint). This config
# keeps pre-commit lightweight and consistent with synesis and synesis-lsp.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: '^(node_modules|\.vscode-test|dist|out)/'
      - id: trailing-whitespace
        exclude: '^(node_modules|\.vscode-test|dist|out)/'
      - id: check-yaml
      - id: check-json
        exclude: '^(node_modules|\.vscode-test)/'
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
