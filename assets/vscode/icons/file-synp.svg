<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0a3d8f"/>
    </linearGradient>
  </defs>
  <rect width="24" height="24" rx="5" fill="url(#bgp)"/>
  <!-- Connection lines -->
  <g stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round">
    <line x1="7" y1="7"  x2="15" y2="12"/>
    <line x1="7" y1="12" x2="15" y2="12"/>
    <line x1="7" y1="17" x2="15" y2="12"/>
  </g>
  <!-- Satellite nodes -->
  <g fill="rgba(255,255,255,0.6)">
    <circle cx="7" cy="7"  r="1.6"/>
    <circle cx="7" cy="12" r="1.6"/>
    <circle cx="7" cy="17" r="1.6"/>
  </g>
  <!-- Hub: white ring + dark center -->
  <circle cx="17" cy="12" r="3.8" fill="white" opacity="0.95"/>
  <circle cx="17" cy="12" r="2.2" fill="#0a3d8f"/>
  <circle cx="17" cy="12" r="0.9" fill="rgba(255,255,255,0.5)"/>
</svg>
