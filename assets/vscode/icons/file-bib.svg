<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#57606a"/>
      <stop offset="100%" stop-color="#32393f"/>
    </linearGradient>
  </defs>
  <rect width="24" height="24" rx="5" fill="url(#bgb)"/>
  <!-- Open book: left page -->
  <path d="M12,17.5 L12,8 L6,6.5 L6,16 Z" fill="white" opacity="0.9"/>
  <!-- Open book: right page -->
  <path d="M12,17.5 L12,8 L18,6.5 L18,16 Z" fill="white" opacity="0.6"/>
  <!-- Spine -->
  <line x1="12" y1="7.8" x2="12" y2="17.5"
        stroke="rgba(50,57,63,0.55)" stroke-width="0.9"/>
  <!-- Left page text lines -->
  <g stroke="rgba(50,57,63,0.45)" stroke-width="0.85" stroke-linecap="round">
    <line x1="7.5" y1="10"   x2="10.5" y2="10.4"/>
    <line x1="7.5" y1="12.2" x2="10.5" y2="12.6"/>
    <line x1="7.5" y1="14.4" x2="10.5" y2="14.8"/>
  </g>
</svg>
