<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer S — cyan with glow -->
  <path d="M16,5 C22,5 22,12 12,12 C2,12 2,19 8,19"
        fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="butt"
        filter="url(#glow)"/>
  <!-- Inner S — lime green -->
  <path d="M14,7.5 C19,7.5 19,12 12,12 C5,12 5,16.5 10,16.5"
        fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="butt"/>
</svg>
